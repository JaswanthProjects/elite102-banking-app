<!DOCTYPE html>
<html>
<head>
    <title>Withdraw - Banking App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; }
        label { display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        .btn { background-color: #4CAF50; color: white; padding: 10px; border: none; cursor: pointer; margin-top: 20px; }
        .btn-secondary { background-color: #666; }
    </style>
</head>
<body>
    <h1>Withdraw from {{ user[1] }}</h1>
    <p>Current balance: ${{ "%.2f"|format(user[3]) }}</p>
    <form method="POST">
        <label for="amount">Amount:</label>
        <input type="number" id="amount" name="amount" step="0.01" min="0.01" required>

        {% if error %}
        <p style="color: red; margin-top: 10px;">{{ error }}</p>
        {% endif %}

        <button type="submit" class="btn">Withdraw</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary" style="text-decoration: none; display: inline-block; margin-left: 10px;">Cancel</a>
    </form>
</body>
</html>
