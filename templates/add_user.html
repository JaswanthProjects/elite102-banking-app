<!DOCTYPE html>
<html>
<head>
    <title>Add User - Banking App</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; }
        label { display: block; margin-top: 10px; }
        input { width: 100%; padding: 8px; margin-top: 5px; }
        .btn { background-color: #4CAF50; color: white; padding: 10px; border: none; cursor: pointer; margin-top: 20px; }
        .btn-secondary { background-color: #666; }
    </style>
</head>
<body>
    <h1>Add New User</h1>
    <form method="POST">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="balance">Initial Balance:</label>
        <input type="number" id="balance" name="balance" step="0.01" required>

        <button type="submit" class="btn">Add User</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary" style="text-decoration: none; display: inline-block; margin-left: 10px;">Cancel</a>
    </form>
</body>
</html>
